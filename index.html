<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Private Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* ব্যাকগ্রাউন্ড ভিডিও স্টাইল */
        .video-background {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1;
            object-fit: cover;
        }

        /* মেইন কন্টেইনার (ডিসপ্লের মাঝে রাখার জন্য) */
        .content-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65); /* ভিডিওর ওপর হালকা কালো পর্দা যেন টেক্সট প্রিমিয়াম ফুটে ওঠে */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            color: #fff;
        }

        /* স্পেশাল ব্র্যান্ডিং টেক্সট (প্রিমিয়াম স্টাইল) */
        .locanto-branding {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
            text-shadow: 0px 4px 15px rgba(0, 0, 0, 0.6);
        }

        .blue-text { color: #007bff; }
        .lite-orange { color: #ffb066; }
        .deep-orange { color: #ff6600; }

        /* মেইন হেডলাইন (প্রিমিয়াম লুক) */
        .headline {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 40px;
            max-width: 650px;
            line-height: 1.5;
            letter-spacing: 0.5px;
            text-shadow: 2px 3px 6px rgba(0, 0, 0, 0.9);
        }

        .red-text {
            color: #ff3333;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.3);
        }

        /* কাউন্টডাউন টাইমার */
        .countdown-box {
            font-size: 16px;
            font-weight: 500;
            background: rgba(255, 0, 0, 0.15);
            border: 1px solid rgba(255, 0, 0, 0.35);
            padding: 10px 24px;
            border-radius: 50px;
            margin-bottom: 20px;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
        }

        #timer {
            font-weight: 700;
            color: #ff3333;
        }

        /* কল-টু-অ্যাকশন বাটন */
        .cta-button {
            background: linear-gradient(135deg, #ff6600, #ff3300);
            color: white;
            border: none;
            padding: 18px 60px;
            font-size: 24px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0px 6px 25px rgba(255, 51, 0, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            text-decoration: none;
            display: inline-block;
        }

        .cta-button:hover {
            transform: scale(1.05);
            box-shadow: 0px 8px 30px rgba(255, 51, 0, 0.8);
        }

        /* ফেক বাফারিং স্ক্রিন */
        .buffering-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .spinner {
            width: 65px;
            height: 65px;
            border: 6px solid #333;
            border-top: 6px solid #ff6600;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .buffering-text {
            color: white;
            font-size: 19px;
            font-weight: 500;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <!-- অনবরত লুপে চলা ব্যাকগ্রাউন্ড ভিডিও -->
    <video autoplay loop muted playsinline class="video-background">
        <source src="vid1x.mp4" type="video/mp4">
    </video>

    <!-- মেইন কন্টেন্ট এরিয়া -->
    <div class="content-overlay">
        
        <!-- স্পেশাল প্রিমিয়াম ব্র্যান্ড টেক্সট (লোগো ও Powrd By ছাড়া) -->
        <div class="locanto-branding">
            <span class="blue-text">Lo</span>can<span class="lite-orange">co</span><span class="deep-orange">to</span>
        </div>

        <!-- প্রধান অফার টেক্সট -->
        <div class="headline">
            Start Private Secure Chat With <span class="red-text">Nina</span> she is online Now
        </div>

        <!-- রিভার্স কাউন্টডাউন টাইমার -->
        <div class="countdown-box">
            Free Registration End: <span id="timer">00:39:46</span>
        </div>

        <!-- অ্যাকশন বাটন -->
        <button class="cta-button" onclick="startBuffering()">Join Now</button>

    </div>

    <!-- ফেক বাফারিং স্ক্রিন -->
    <div class="buffering-overlay" id="bufferScreen">
        <div class="spinner"></div>
        <div class="buffering-text">Connecting to Secure Server...</div>
    </div>

    <script>
        // এখানে আপনার আসল অ্যাফিলিয়েট লিংকটি বসান
        const affiliateLink = "https://YOUR_AFFILIATE_LINK_HERE.com";

        // ৩৯ মিনিট ৪৬ সেকেন্ড কাউন্টডাউন স্ক্রিপ্ট
        let totalSeconds = (39 * 60) + 46; 

        const timerElement = document.getElementById('timer');

        const countdownInterval = setInterval(() => {
            if (totalSeconds <= 0) {
                totalSeconds = (39 * 60) + 46; // রিসেট লুপ
            }

            let hours = Math.floor(totalSeconds / 3600);
            let minutes = Math.floor((totalSeconds % 3600) / 60);
            let seconds = totalSeconds % 60;

            hours = hours < 10 ? "0" + hours : hours;
            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;

            timerElement.textContent = hours + ":" + minutes + ":" + seconds;
            totalSeconds--;
        }, 1000);

        // ২ সেকেন্ডের ফেক বাফারিং এবং রিডাইরেক্ট ফাংশন
        function startBuffering() {
            const bufferScreen = document.getElementById('bufferScreen');
            bufferScreen.style.display = 'flex'; 

            setTimeout(() => {
                window.location.href = affiliateLink; 
            }, 2000); 
        }
    </script>

</body>
</html>
