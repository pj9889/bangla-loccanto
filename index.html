<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Private Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* সুপার গ্যারান্টিড ফুল-স্ক্রিন ভিডিও লুপ স্টাইল */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .video-background {
            width: 100%;
            height: 100%;
            object-fit: cover; /* ভিডিওর রেশিও ঠিক রেখে পুরো স্ক্রিন জুড়ে রাখবে */
        }

        /* কন্টেন্ট এরিয়া (ভিডিওর ঠিক ওপরে ভাসমান থাকবে) */
        .content-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2; /* ভিডিওর ওপরে রাখার জন্য জেন-ইনডেক্স ২ করা হয়েছে */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            color: #fff;
            background: transparent; /* কোনো কালো পর্দা বা আলো কমানো হবে না, ভিডিও ১০০% স্পষ্ট থাকবে */
        }

        /* স্পেশাল প্রিমিয়াম ব্র্যান্ড টেক্সট (Locanto) */
        .locanto-branding {
            font-size: 45px;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
            /* লেখার পেছনে টেক্সট শ্যাডো বাড়ানো হয়েছে যেন ভিডিওর ওপরেও পরিষ্কার পড়া যায় */
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.9), -2px -2px 8px rgba(0, 0, 0, 0.9);
        }

        .blue-text { color: #007bff; }
        .lite-orange { color: #ffb066; }
        .deep-orange { color: #ff6600; }

        /* মেইন হেডলাইন টেক্সট */
        .headline {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 40px;
            max-width: 650px;
            line-height: 1.5;
            letter-spacing: 0.5px;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.9), -2px -2px 6px rgba(0, 0, 0, 0.9);
        }

        .red-text {
            color: #ff3333;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.6);
        }

        /* কাউন্টডাউন টাইমার বক্স */
        .countdown-box {
            font-size: 16px;
            font-weight: 500;
            background: rgba(0, 0, 0, 0.7); /* ভিডিওর ওপর টাইমার স্পষ্ট করার জন্য ব্যাকগ্রাউন্ড কালো */
            border: 1px solid rgba(255, 0, 0, 0.5);
            padding: 10px 24px;
            border-radius: 50px;
            margin-bottom: 20px;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }

        #timer {
            font-weight: 700;
            color: #ff3333;
        }

        /* কল-টু-অ্যাকশন বাটন (Join Now) */
        .cta-button {
            background: linear-gradient(135deg, #ff6600, #ff3300);
            color: white;
            border: none;
            padding: 18px 60px;
            font-size: 24px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0px 6px 25px rgba(255, 51, 0, 0.6);
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-block;
        }

        .cta-button:hover {
            transform: scale(1.05);
            box-shadow: 0px 8px 30px rgba(255, 51, 0, 0.9);
        }

        /* ফেক বাফারিং স্ক্রিন */
        .buffering-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .spinner {
            width: 65px;
            height: 65px;
            border: 6px solid #333;
            border-top: 6px solid #ff6600;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .buffering-text {
            color: white;
            font-size: 19px;
            font-weight: 500;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <!-- ভিডিও রাখার মূল কন্টেইনার -->
    <div class="video-container">
        <!-- অনবরত চলা ফুল ব্রাইটনেস ভিডিও (কোডে loop, muted, autoplay দেওয়া আছে) -->
        <video autoplay loop muted playsinline class="video-background">
            <source src="vid1x.mp4" type="video/mp4">
            আপনার ব্রাউজারটি ভিডিও সাপোর্ট করছে না।
        </video>
    </div>

    <!-- মেইন কন্টেন্ট এরিয়া (ভিডিওর ওপরে ভাসমান) -->
    <div class="content-overlay">
        
        <!-- প্রিমিয়াম ব্র্যান্ড টেক্সট -->
        <div class="locanto-branding">
            <span class="blue-text">Lo</span>can<span class="lite-orange">co</span><span class="deep-orange">to</span>
        </div>

        <!-- প্রধান অফার টেক্সট -->
        <div class="headline">
            Start Private Secure Chat With <span class="red-text">Nina</span> she is online Now
        </div>

        <!-- রিভার্স কাউন্টডাউন টাইমার -->
        <div class="countdown-box">
            Free Registration End: <span id="timer">00:39:46</span>
        </div>

        <!-- অ্যাকশন বাটন -->
        <button class="cta-button" onclick="startBuffering()">Join Now</button>

    </div>

    <!-- ফেক বাফারিং স্ক্রিন (ক্লিক করার পর আসবে) -->
    <div class="buffering-overlay" id="bufferScreen">
        <div class="spinner"></div>
        <div class="buffering-text">Connecting to Secure Server...</div>
    </div>

    <script>
        // এখানে আপনার আসল অ্যাফিলিয়েট লিংকটি বসান
        const affiliateLink = "https://dghhgdb.kftln.com/p/Z7zwu";

        // ৩৯ মিনিট ৪৬ সেকেন্ড কাউন্টডাউন স্ক্রিপ্ট
        let totalSeconds = (39 * 60) + 46; 

        const timerElement = document.getElementById('timer');

        setInterval(() => {
            if (totalSeconds <= 0) {
                totalSeconds = (39 * 60) + 46; // সময় শেষ হলে আবার ৩৯:৪৬ থেকে শুরু হবে
            }

            let hours = Math.floor(totalSeconds / 3600);
            let minutes = Math.floor((totalSeconds % 3600) / 60);
            let seconds = totalSeconds % 60;

            hours = hours < 10 ? "0" + hours : hours;
            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;

            timerElement.textContent = hours + ":" + minutes + ":" + seconds;
            totalSeconds--;
        }, 1000);

        // ২ সেকেন্ডের ফেক বাফারিং এবং রিডাইরেক্ট ফাংশন
        function startBuffering() {
            const bufferScreen = document.getElementById('bufferScreen');
            bufferScreen.style.display = 'flex'; 

            setTimeout(() => {
                window.location.href = affiliateLink; 
            }, 2000); 
        }
    </script>

</body>
</html>
